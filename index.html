const KEYS = { empleados: "emp_v1", leyes: "leyes_v1", historial: "hist_v1", prestamos: "prest_v1" };

async function load(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
async function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); }
}

// ─── LEYES PANAMÁ ─────────────────────────────────────────────────────────────

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmt = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n || 0);
const pct = (b, p) => (b * p) / 100;
const hoy = () => new Date().toISOString().split("T")[0];

function antiguedad(fechaIngreso) {
  if (!fechaIngreso) return { años: 0, meses: 0, texto: "—", totalMeses: 0 };
  const s = new Date(fechaIngreso), h = new Date();
  let a = h.getFullYear() - s.getFullYear(), m = h.getMonth() - s.getMonth();
  if (m < 0) { a--; m += 12; }
  const total = a * 12 + m;
  const texto = a > 0 ? `${a} año${a !== 1 ? "s" : ""} ${m} mes${m !== 1 ? "es" : ""}` : `${m} mes${m !== 1 ? "es" : ""}`;
  return { años: a, meses: m, texto, totalMeses: total };
}

function proximasVacaciones(fechaIngreso, vacacionesDias) {
  if (!fechaIngreso) return null;
  const inicio = new Date(fechaIngreso);
  const h = new Date();
  const aniosCompletos = h.getFullYear() - inicio.getFullYear() + (h >= new Date(h.getFullYear(), inicio.getMonth(), inicio.getDate()) ? 0 : -1);
  const proximoAniversario = new Date(inicio);
  proximoAniversario.setFullYear(inicio.getFullYear() + aniosCompletos + 1);
  const diasRestantes = Math.ceil((proximoAniversario - h) / 86400000);
  return { fecha: proximoAniversario.toLocaleDateString("es-PA"), diasRestantes, aniosCumplidos: aniosCompletos + 1 };
}

// Para empleadas domésticas en Panamá:
// - NO se les descuenta CSS ni Seguro Educativo (lo paga el empleador aparte)
// - Se paga QUINCENALMENTE → salario mensual / 2 por quincena
// - Solo se descuenta préstamos u otras deducciones acordadas
function calcularPago(emp, leyes, prestamos, extraDias) {
  const salarioMensual = parseFloat(emp.salario) || 0;
  const quincena = salarioMensual / 2; // base de cada pago

  const horasEx = parseFloat(emp.horasExtra) || 0;
  const horasExNoc = parseFloat(emp.horasExtraNocturnas) || 0;
  const diasAus = parseFloat(emp.diasAusencia) || 0;
  const bonos = parseFloat(emp.bonos) || 0;
  const otrosDeduc = parseFloat(emp.otrosDeduc) || 0;

  const valorDia = salarioMensual / 30;
  const valorHora = valorDia / leyes.horasJornadaDiurna;
  const pagoHorasEx = horasEx * valorHora * (1 + leyes.horasExtraRecargo / 100);
  const pagoHorasExNoc = horasExNoc * valorHora * (1 + leyes.horasExtraNocturnas / 100);
  const descAusencias = diasAus * valorDia;

  // Días libres trabajados
  const diasLibres = extraDias || [];
  const pagoDiasLibres = diasLibres.reduce((sum, d) => {
    if (d.modo === "fijo") return sum + (parseFloat(d.monto) || 0);
    return sum + valorDia * (1 + (parseFloat(d.recargo) || 100) / 100);
  }, 0);

  // Préstamos — solo descuento si el empleador lo acuerda, NO CSS ni SegEdu al empleado
  const prestEmpleado = (prestamos || []).filter(p => p.empleadoId === emp.id && p.saldo > 0);
  const descPrestamo = prestEmpleado.reduce((s, p) => s + Math.min(p.cuotaMensual, p.saldo), 0);

  // Total a pagar esta quincena (base quincenal + extras de esta quincena)
  const totalExtras = pagoHorasEx + pagoHorasExNoc + bonos + pagoDiasLibres;
  const totalDescuentos = descAusencias + otrosDeduc + descPrestamo;

  // Neto que recibe la empleada — SIN descuento de CSS ni SegEdu
  const netoEmpleado = quincena + totalExtras - totalDescuentos;

  // Lo que el empleador paga aparte a la CSS (no sale del bolsillo de la empleada)
  const cssPatron = pct(salarioMensual, leyes.cssEmpleador);
  const segEduPatron = pct(salarioMensual, leyes.segEduEmpleador);

  // Provisiones mensuales que el empleador debe reservar
  const decimoTercerMensual = leyes.decimoTercerMes ? salarioMensual / 12 : 0;
  const vacacionesMensual = (salarioMensual / 12) * (leyes.vacacionesDias / 30);

  // Costo real total del empleador por mes
  const costoMensualEmpleador = salarioMensual + cssPatron + segEduPatron + decimoTercerMensual + vacacionesMensual;

  const salMin = emp.region === "1" ? leyes.salarioMinimoR1 : leyes.salarioMinimoR2;

  return {
    emp, salarioMensual, quincena,
    pagoHorasEx, pagoHorasExNoc, bonos, descAusencias,
    pagoDiasLibres, diasLibres,
    totalExtras, totalDescuentos,
    otrosDeduc, descPrestamo, prestEmpleado,
    netoEmpleado,
    cssPatron, segEduPatron,
    decimoTercerMensual, vacacionesMensual,
    costoMensualEmpleador, salMin,
    bajoMinimo: salarioMensual < salMin,
  };
}

// ─── LIQUIDACIÓN Art. 231 Código de Trabajo — Trabajadores Domésticos ─────────
// Régimen ESPECIAL doméstico (distinto al art. 225 general):
// Indemnización por despido sin causa: 1 MES de salario por año (o fracción ≥ 6 meses), tope 3 meses
// Renuncia voluntaria: NO hay indemnización ni prima de antigüedad
// En ambos casos: vacaciones proporcionales + décimo tercer mes proporcional + días trabajados del período
function calcularLiquidacion(emp, leyes, motivo, fechaSalida) {
  const salarioMensual = parseFloat(emp.salario) || 0;
  const valorDia = salarioMensual / 30;
  const fechaEntrada = emp.fechaIngreso ? new Date(emp.fechaIngreso) : null;
  const fechaSalidaDate = fechaSalida ? new Date(fechaSalida) : new Date();

  // Antigüedad exacta en años y meses
  let anosCompletos = 0, mesesExtra = 0, diasExtra = 0;
  if (fechaEntrada) {
    anosCompletos = fechaSalidaDate.getFullYear() - fechaEntrada.getFullYear();
    mesesExtra = fechaSalidaDate.getMonth() - fechaEntrada.getMonth();
    diasExtra = fechaSalidaDate.getDate() - fechaEntrada.getDate();
    if (diasExtra < 0) { mesesExtra--; diasExtra += 30; }
    if (mesesExtra < 0) { anosCompletos--; mesesExtra += 12; }
  }
  const totalMeses = anosCompletos * 12 + mesesExtra;

  // ── VACACIONES PROPORCIONALES ──
  // Meses trabajados desde el último aniversario
  const mesesDesdeAniversario = mesesExtra + (diasExtra >= 15 ? 1 : 0);
  const vacProporcionales = (salarioMensual / 12) * mesesDesdeAniversario;

  // ── DÉCIMO TERCER MES PROPORCIONAL ──
  // Último pago de décimo: abril, agosto o diciembre → calcular meses desde el último
  const mesActual = fechaSalidaDate.getMonth(); // 0-11
  const pagosMes = [3, 7, 11]; // abril=3, agosto=7, diciembre=11
  let mesUltimoPago = pagosMes.filter(m => m < mesActual).pop() ?? 11;
  if (mesUltimoPago > mesActual) mesUltimoPago = 11; // diciembre del año anterior
  let mesesDesdeDecimo = mesActual - mesUltimoPago;
  if (mesesDesdeDecimo <= 0) mesesDesdeDecimo = 4; // aprox. un cuatrimestre
  const decimoProporcional = (salarioMensual / 12) * Math.min(mesesDesdeDecimo, 4);

  // ── DÍAS TRABAJADOS DEL PERÍODO ACTUAL (quincena en curso) ──
  const diaDelMes = fechaSalidaDate.getDate();
  const diasTrabajadosPeriodo = diaDelMes <= 15 ? diaDelMes : diaDelMes - 15;
  const pagoDiasTrabajados = diasTrabajadosPeriodo * valorDia;

  // ── INDEMNIZACIÓN — solo en despido sin causa (Art. 231 CT domésticos) ──
  // 1 mes por año trabajado (fracción ≥ 6 meses cuenta como año), tope 3 meses
  let indemnizacion = 0;
  let primaAntigüedad = 0;
  let preaviso = 0;

  if (motivo === "despido_injustificado") {
    // Años completos + fracción ≥ 6 meses
    let aniosParaCalculo = anosCompletos;
    if (mesesExtra >= 6) aniosParaCalculo++;
    indemnizacion = Math.min(aniosParaCalculo * salarioMensual, 3 * salarioMensual);

    // Prima de antigüedad: aplica también en despido (Art. 229A)
    // Primeros 10 años: 1.92 semanas/año. Simplificado: salario/4.333 * 1.92 * años
    const salarioSemanal = salarioMensual / 4.3333;
    if (totalMeses >= 12) {
      primaAntigüedad = salarioSemanal * 1.92 * (anosCompletos + (mesesExtra >= 6 ? 0.5 : mesesExtra / 12));
    }

    // Preaviso: 1 semana si < 2 años, 2 semanas si ≥ 2 años (Art. 231)
    preaviso = totalMeses < 24 ? salarioSemanal : salarioSemanal * 2;

  } else if (motivo === "renuncia_voluntaria") {
    // Sin indemnización, sin prima (renuncia sin causa justificada)
    // Descuento: si no dio aviso de 15 días → se descuenta 1 semana (opcional, lo dejamos en $0)
    indemnizacion = 0;
    primaAntigüedad = 0;
    preaviso = 0;

  } else if (motivo === "mutuo_acuerdo") {
    // Prima de antigüedad sí aplica
    const salarioSemanal = salarioMensual / 4.3333;
    if (totalMeses >= 12) {
      primaAntigüedad = salarioSemanal * 1.92 * (anosCompletos + mesesExtra / 12);
    }
    indemnizacion = 0;
    preaviso = 0;

  } else if (motivo === "despido_justificado") {
    // Sin indemnización, sin prima por indemnización, pero sí prima de antigüedad
    const salarioSemanal = salarioMensual / 4.3333;
    if (totalMeses >= 12) {
      primaAntigüedad = salarioSemanal * 1.92 * (anosCompletos + mesesExtra / 12);
    }
    indemnizacion = 0;
    preaviso = 0;
  }

  const totalLiquidacion = pagoDiasTrabajados + vacProporcionales + decimoProporcional + primaAntigüedad + indemnizacion + preaviso;

  return {
    emp, motivo, fechaSalida: fechaSalidaDate.toLocaleDateString("es-PA"),
    salarioMensual, valorDia,
    anosCompletos, mesesExtra, diasExtra, totalMeses,
    pagoDiasTrabajados, diasTrabajadosPeriodo,
    vacProporcionales, mesesDesdeAniversario,
    decimoProporcional, mesesDesdeDecimo,
    primaAntigüedad, indemnizacion, preaviso,
    totalLiquidacion,
  };
}


const C = {
  bg: "#f0f6f2", card: "#ffffff", dark: "#0f2419", accent: "#2e7d55",
  accentLight: "#e8f5ee", border: "#cce0d5", muted: "#6a9279", warn: "#c0392b",
  gold: "#b5860d",
};

function Btn({ children, onClick, variant = "primary", small, disabled, style: sx }) {
  const styles = {
    primary: { background: C.dark, color: "#e8f5ee" },
    accent: { background: C.accent, color: "#fff" },
    outline: { background: "transparent", color: C.accent, border: `1.5px solid ${C.accent}` },
    danger: { background: "transparent", color: C.warn, border: `1.5px solid ${C.warn}` },
    ghost: { background: "transparent", color: C.muted, border: `1px solid ${C.border}` },
  };
  return (
    <button disabled={disabled} onClick={onClick} style={{
      fontFamily: "'DM Mono', monospace", fontWeight: 600, fontSize: small ? 10 : 12,
      letterSpacing: "0.07em", padding: small ? "5px 12px" : "9px 18px",
      borderRadius: 5, border: "none", cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.5 : 1, transition: "all 0.15s", whiteSpace: "nowrap",
      ...styles[variant], ...sx
    }}>{children}</button>
  );
}

function Inp({ label, hint, warn, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
      {label && <label style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: C.accent, fontFamily: "monospace" }}>{label}</label>}
      {children}
      {hint && !warn && <span style={{ fontSize: 10, color: C.muted, fontFamily: "monospace" }}>{hint}</span>}
      {warn && <span style={{ fontSize: 10, color: C.warn, fontFamily: "monospace" }}>⚠ {warn}</span>}
    </div>
  );
}

function input(value, onChange, opts = {}) {
  return <input value={value} onChange={e => onChange(e.target.value)} {...opts} style={{
    padding: "8px 12px", border: `1.5px solid ${C.border}`, borderRadius: 5,
    fontSize: 13, fontFamily: "monospace", background: "#f8fcfa", color: C.dark,
    width: "100%", boxSizing: "border-box", outline: "none",
  }} />;
}

function sel(value, onChange, options) {
  return <select value={value} onChange={e => onChange(e.target.value)} style={{
    padding: "8px 12px", border: `1.5px solid ${C.border}`, borderRadius: 5,
    fontSize: 13, fontFamily: "monospace", background: "#f8fcfa", color: C.dark,
    width: "100%", boxSizing: "border-box",
  }}>{options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}</select>;
}

function Card({ children, style: sx }) {
  return <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "20px 24px", marginBottom: 14, ...sx }}>{children}</div>;
}

function SectionTitle({ children, color }) {
  return <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", textTransform: "uppercase", color: color || C.accent, marginBottom: 14, fontFamily: "monospace" }}>{children}</div>;
}

function LineRow({ label, value, color, bold, sub }) {
  return <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px dashed ${C.border}`, fontFamily: "monospace", fontSize: 13 }}>
    <span style={{ color: sub ? C.muted : C.dark, fontWeight: bold ? 700 : 400, paddingLeft: sub ? 12 : 0 }}>{label}</span>
    <span style={{ fontWeight: bold ? 700 : 400, color: color || C.dark }}>{value}</span>
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [leyes, setLeyes] = useState(LEYES_DEFAULT);
  const [empleados, setEmpleados] = useState([]);
  const [prestamos, setPrestamos] = useState([]);
  const [historial, setHistorial] = useState([]);

  // vistas
  const [vistaEmp, setVistaEmp] = useState("lista"); // lista | form | detalle | pago
  const [empActivo, setEmpActivo] = useState(null);
  const [pagoData, setPagoData] = useState(null);
  const [liquidacionData, setLiquidacionData] = useState(null);
  const [formLiq, setFormLiq] = useState({ motivo: "despido_injustificado", fechaSalida: hoy() });

  // form empleado

  const [adjuntos, setAdjuntos] = useState([]);
  const [diasLibresPago, setDiasLibresPago] = useState([]);

  useEffect(() => {

  // save on change
  useEffect(() => { if (ready) save(KEYS.empleados, empleados); }, [empleados, ready]);

  const updLey = (k, v) => setLeyes(l => ({ ...l, [k]: v }));

  // empleado ops
  const guardarEmp = () => {
    if (!formEmp.nombre.trim()) return alert("Ingresa el nombre.");

      setEmpleados(e => e.map(x => x.id === formEmp.id ? formEmp : x));

  const eliminarEmp = (id) => {

  // préstamo ops
  const guardarPrest = () => {

    setFormPrest(prestVacio);
    setVerPrest(false);

  const registrarPago = () => {

RECIBO DE PAGO — QUINCENA ${quincenaNum}

Empleada:       ${emp.nombre}

Región:         ${emp.region}

── DETALLE DEL PAGO ──────────────
Salario mensual base:      ${fmt(p.salarioMensual)}
Base quincena (÷ 2):       ${fmt(p.quincena)}
${p.pagoHorasEx > 0 ? `Horas extra diurnas:       + ${fmt(p.pagoHorasEx)}\n` : ""}${p.pagoHorasExNoc > 0 ? `Horas extra nocturnas:     + ${fmt(p.pagoHorasExNoc)}\n` : ""}${p.bonos > 0 ? `Bonos / Propinas:          + ${fmt(p.bonos)}\n` : ""}${p.pagoDiasLibres > 0 ? `Días libres trabajados:    + ${fmt(p.pagoDiasLibres)}\n` : ""}${p.descAusencias > 0 ? `Descuento ausencias:       - ${fmt(p.descAusencias)}\n` : ""}${p.descPrestamo > 0 ? `Descuento préstamo:        - ${fmt(p.descPrestamo)}\n` : ""}

    );

              </Card>

              const salMin = emp.region === "1" ? leyes.salarioMinimoR1 : leyes.salarioMinimoR2;

              <div className="g3">

                  <div>
                    <div style={{ fontFamily: "'Fraunces',serif", fontSize: 22, fontWeight: 700 }}>{emp.nombre}</div>
                    <div style={{ color: "#5aab7a", fontSize: 13, marginTop: 2 }}>{emp.puesto} · Región {emp.region}</div>
                    {emp.fechaIngreso && <div style={{ color: "#5aab7a", fontSize: 12 }}>Ingreso: {emp.fechaIngreso} · {ant.texto}</div>}
                  </div>
                  <div style={{ marginLeft: "auto", textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: "#5aab7a" }}>SALARIO BASE</div>
                    <div style={{ fontFamily: "'Fraunces',serif", fontSize: 26, fontWeight: 700 }}>{fmt(parseFloat(emp.salario) || 0)}</div>

                  <SectionTitle>📄 Historial de Pagos</SectionTitle>

              <div style={{ display: "flex", gap: 8 }}>

              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>

                        {input(d.descripcion, v => updDiaLibre(d.id, "descripcion", v), { placeholder: "Ej. Domingo 12 de mayo" })}

                    {/* Toggle: auto vs fijo */}
                    <div style={{ display: "flex", gap: 0, marginBottom: 10, borderRadius: 5, overflow: "hidden", border: `1.5px solid ${C.border}`, width: "fit-content" }}>

                        🖨 Re-imprimir
                      </Btn>
                    </div>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        )}

        {/* ══ LEYES / REGLAS ═════════════════════════════════════════════════ */}
        {tab === "leyes" && (
          <div>
            <div style={{ marginBottom: 14, padding: "10px 14px", background: "#fff8e1", border: "1px solid #ffe082", borderRadius: 6, fontSize: 12, color: "#6d5000", fontFamily: "monospace" }}>
              ✏ Edita cualquier valor. Se guarda automáticamente y aplica a todos los cálculos.
            </div>

            <Card>
              <SectionTitle>Salario Mínimo · Decreto Ejecutivo No. 13 (dic. 2025)</SectionTitle>
              <div className="g2">
                <Inp label="Región 1 — Ciudad de Panamá, Colón, David… (USD/mes)" hint="Vigente: $340.00">
                  {input(String(leyes.salarioMinimoR1), v => updLey("salarioMinimoR1", parseFloat(v) || 0), { type: "number", step: "0.01" })}
                </Inp>
                <Inp label="Región 2 — Resto del país (USD/mes)" hint="Vigente: $315.00">
                  {input(String(leyes.salarioMinimoR2), v => updLey("salarioMinimoR2", parseFloat(v) || 0), { type: "number", step: "0.01" })}
                </Inp>
              </div>
            </Card>

            <Card>
              <SectionTitle>CSS · Caja de Seguro Social · Ley 462 (2025)</SectionTitle>
              <div className="g2">
                <Inp label="Aporte Empleador %" hint="13.25% hasta feb 2027 → 14.25% mar 2027 → 15.25% mar 2029">
                  {input(String(leyes.cssEmpleador), v => updLey("cssEmpleador", parseFloat(v) || 0), { type: "number", step: "0.01" })}
                </Inp>
                <Inp label="Aporte Empleado %" hint="9.75% del salario bruto">
                  {input(String(leyes.cssEmpleado), v => updLey("cssEmpleado", parseFloat(v) || 0), { type: "number", step: "0.01" })}
                </Inp>
              </div>
            </Card>

            <Card>
              <SectionTitle>Seguro Educativo</SectionTitle>
              <div className="g2">
                <Inp label="Empleador %" hint="1.50%">{input(String(leyes.segEduEmpleador), v => updLey("segEduEmpleador", parseFloat(v) || 0), { type: "number", step: "0.01" })}</Inp>
                <Inp label="Empleado %" hint="1.25%">{input(String(leyes.segEduEmpleado), v => updLey("segEduEmpleado", parseFloat(v) || 0), { type: "number", step: "0.01" })}</Inp>
              </div>
            </Card>

            <Card>
              <SectionTitle>Jornada y Horas Extra · Código de Trabajo de Panamá</SectionTitle>
              <div className="g3">
                <Inp label="Horas jornada diurna">{input(String(leyes.horasJornadaDiurna), v => updLey("horasJornadaDiurna", parseFloat(v) || 8), { type: "number" })}</Inp>
                <Inp label="Recargo horas extra diurnas %" hint="25% = pagan al 125%">{input(String(leyes.horasExtraRecargo), v => updLey("horasExtraRecargo", parseFloat(v) || 0), { type: "number" })}</Inp>
                <Inp label="Recargo horas extra nocturnas %" hint="50% = pagan al 150%">{input(String(leyes.horasExtraNocturnas), v => updLey("horasExtraNocturnas", parseFloat(v) || 0), { type: "number" })}</Inp>
              </div>
            </Card>

            <Card>
              <SectionTitle>Beneficios Anuales</SectionTitle>
              <div className="g2">
                <Inp label="Días de Vacaciones por Año" hint="Panamá: 30 días (Art. 54 CT domésticos)">
                  {input(String(leyes.vacacionesDias), v => updLey("vacacionesDias", parseFloat(v) || 30), { type: "number" })}
                </Inp>
                <Inp label="Décimo Tercer Mes" hint="Obligatorio — Art. 145 Código de Trabajo">
                  {sel(leyes.decimoTercerMes ? "si" : "no", v => updLey("decimoTercerMes", v === "si"), [
                    ["si", "Sí — Obligatorio en Panamá"],
                    ["no", "No incluir en cálculo"]
                  ])}
                </Inp>
              </div>
            </Card>

            <div style={{ padding: "12px 16px", background: C.accentLight, border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 11, color: C.muted, lineHeight: 1.7 }}>
              <strong style={{ color: C.dark }}>Referencias legales vigentes</strong><br />
              · Salario mínimo doméstico: Decreto Ejecutivo No. 13 del 31 dic. 2025 (MITRADEL)<br />
              · CSS empleador: 13.25% desde abril 2025 (Ley 462 del 18 mar. 2025)<br />
              · Décimo Tercer Mes: Art. 145–161 Código de Trabajo de Panamá<br />
              · Vacaciones: 30 días por año laborado (Art. 54 CT, trabajadores domésticos)<br />
              · Panamá usa el Balboa (B/.) con paridad 1:1 al dólar estadounidense (USD)
            </div>
          </div>
        )}

      </div>

      <div style={{ textAlign: "center", padding: "20px", fontSize: 10, color: C.muted, fontFamily: "monospace", letterSpacing: ".1em" }}>
        DATOS GUARDADOS EN TU DISPOSITIVO · DECRETO No.13 · CSS LEY 462 · CÓDIGO DE TRABAJO PANAMÁ
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
