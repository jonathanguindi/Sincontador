// Build proper headers for calling Edge Functions.
// IMPORTANT: With the new sb_publishable_* keys (non-JWT), Supabase REQUIRES:
//   - Authorization: Bearer <user session JWT>   (a real JWT — passes verify_jwt)
//   - apikey:        <publishable key>           (identifies the project)
// Sending the publishable key in Authorization fails with "Wrong number of segments".
async function authHeaders() {
  const { data: { session } } = await supabase.auth.getSession();
  const h = { 'Content-Type': 'application/json', 'apikey': SUPA_KEY };
  if (session?.access_token) h['Authorization'] = `Bearer ${session.access_token}`;
  return h;
}

function antiguedad(fechaIngreso) {
  if (!fechaIngreso) return { años: 0, meses: 0, texto: "—", totalMeses: 0 };
  const s = new Date(fechaIngreso), h = new Date();
  let a = h.getFullYear() - s.getFullYear(), m = h.getMonth() - s.getMonth();
  if (m < 0) { a--; m += 12; }
  const total = a * 12 + m;
  const texto = a > 0 ? `${a} año${a !== 1 ? "s" : ""} ${m} mes${m !== 1 ? "es" : ""}` : `${m} mes${m !== 1 ? "es" : ""}`;
  return { años: a, meses: m, texto, totalMeses: total };
}

// ─── HISTORIAL DE SALARIOS ─────────────────────────────────────────────────
// Cada empleada puede tener un array `aumentos` con objetos:
//   { id, fecha: "YYYY-MM-DD", salarioAnterior, salarioNuevo, motivo? }
// El salario "actual" (emp.salario) refleja el último estado vigente.

// Devuelve el salario mensual vigente en una fecha dada.
function salarioEnFecha(emp, fechaStr) {
  const salarioActual = parseFloat(emp.salario) || 0;
  const aumentos = (emp.aumentos || []).slice().sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
  if (aumentos.length === 0) return salarioActual;
  const fecha = fechaStr instanceof Date ? fechaStr : new Date(fechaStr);
  // Caminamos los aumentos: el último aumento con fecha <= `fecha` define el salario en ese momento.
  let aplicable = null;
  for (const a of aumentos) {
    if (new Date(a.fecha) <= fecha) aplicable = a;
    else break;
  }
  if (aplicable) return parseFloat(aplicable.salarioNuevo) || 0;
  // La fecha es anterior a todos los aumentos → usar el salarioAnterior del primer aumento
  return parseFloat(aumentos[0].salarioAnterior) || salarioActual;
}

// Devuelve el salario mensual promedio ponderado por días entre dos fechas.
// Usado para décimo y vacaciones proporcionales con aumentos mediante el período.
function salarioPromedioPeriodo(emp, fechaInicio, fechaFin) {
  const inicio = fechaInicio instanceof Date ? fechaInicio : new Date(fechaInicio);
  const fin = fechaFin instanceof Date ? fechaFin : new Date(fechaFin);
  if (fin <= inicio) return parseFloat(emp.salario) || 0;
  const aumentos = (emp.aumentos || []).slice().sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
  if (aumentos.length === 0) return parseFloat(emp.salario) || 0;
  // Construir segmentos dentro del período
  const segmentos = [];
  let cursorFecha = inicio;
  let cursorSalario = salarioEnFecha(emp, inicio);
  for (const a of aumentos) {
    const aFecha = new Date(a.fecha);
    if (aFecha <= inicio) continue;
    if (aFecha > fin) break;
    segmentos.push({ desde: cursorFecha, hasta: aFecha, salario: cursorSalario });
    cursorFecha = aFecha;
    cursorSalario = parseFloat(a.salarioNuevo) || cursorSalario;
  }
  segmentos.push({ desde: cursorFecha, hasta: fin, salario: cursorSalario });
  let totalDias = 0, sumaPonderada = 0;
  for (const s of segmentos) {
    const dias = Math.max(0, (s.hasta - s.desde) / 86400000);
    totalDias += dias;
    sumaPonderada += dias * s.salario;
  }
  return totalDias > 0 ? sumaPonderada / totalDias : (parseFloat(emp.salario) || 0);
}

function proximasVacaciones(fechaIngreso, vacacionesDias) {
  if (!fechaIngreso) return null;
  const inicio = new Date(fechaIngreso), h = new Date();
  const aniosCompletos = h.getFullYear() - inicio.getFullYear() + (h >= new Date(h.getFullYear(), inicio.getMonth(), inicio.getDate()) ? 0 : -1);
  const prox = new Date(inicio);
  prox.setFullYear(inicio.getFullYear() + aniosCompletos + 1);
  const diasRestantes = Math.ceil((prox - h) / 86400000);
  return { fecha: prox.toLocaleDateString("es-PA"), diasRestantes, aniosCumplidos: aniosCompletos + 1 };
}

function calcularPago(emp, leyes, prestamos, extraDias) {
  const salarioMensual = parseFloat(emp.salario) || 0;
  const quincena = salarioMensual / 2;
  const horasEx = parseFloat(emp.horasExtra) || 0;
  const horasExNoc = parseFloat(emp.horasExtraNocturnas) || 0;
  const diasAus = parseFloat(emp.diasAusencia) || 0;
  const bonos = parseFloat(emp.bonos) || 0;
  const otrosDeduc = parseFloat(emp.otrosDeduc) || 0;
  const valorDia = salarioMensual / 30;
  const valorHora = valorDia / leyes.horasJornadaDiurna;
  const pagoHorasEx = horasEx * valorHora * (1 + leyes.horasExtraRecargo / 100);
  const pagoHorasExNoc = horasExNoc * valorHora * (1 + leyes.horasExtraNocturnas / 100);
  const descAusencias = diasAus * valorDia;
  const diasLibres = extraDias || [];
  const pagoDiasLibres = diasLibres.reduce((sum, d) => {
    if (d.modo === "fijo") return sum + (parseFloat(d.monto) || 0);
    return sum + valorDia * (1 + (parseFloat(d.recargo) || 100) / 100);
  }, 0);
  const prestEmpleado = (prestamos || []).filter(p => p.empleadoId === emp.id && p.saldo > 0);
  const descPrestamo = prestEmpleado.reduce((s, p) => s + Math.min(p.cuotaMensual, p.saldo), 0);
  const netoEmpleado = quincena + pagoHorasEx + pagoHorasExNoc + bonos + pagoDiasLibres - descAusencias - otrosDeduc - descPrestamo;
  const cssPatron = (emp.aplicaCSS !== false) ? pct(salarioMensual, leyes.cssEmpleador) : 0;
  const segEduPatron = (emp.aplicaSegEdu !== false) ? pct(salarioMensual, leyes.segEduEmpleador) : 0;
  const decimoTercerMensual = leyes.decimoTercerMes ? salarioMensual / 12 : 0;
  const vacacionesMensual = (salarioMensual / 12) * (leyes.vacacionesDias / 30);
  const costoMensualEmpleador = salarioMensual + cssPatron + segEduPatron + decimoTercerMensual + vacacionesMensual;
  const salMin = emp.region === "1" ? leyes.salarioMinimoR1 : leyes.salarioMinimoR2;
  return { emp, salarioMensual, quincena, pagoHorasEx, pagoHorasExNoc, bonos, descAusencias, pagoDiasLibres, diasLibres, otrosDeduc, descPrestamo, prestEmpleado, netoEmpleado, cssPatron, segEduPatron, decimoTercerMensual, vacacionesMensual, costoMensualEmpleador, salMin, bajoMinimo: salarioMensual < salMin };
}

function calcularLiquidacion(emp, leyes, motivo, fechaSalida) {
  const salarioMensual = parseFloat(emp.salario) || 0;
  const valorDia = salarioMensual / 30;
  const fechaEntrada = emp.fechaIngreso ? new Date(emp.fechaIngreso) : null;
  const fechaSalidaDate = fechaSalida ? new Date(fechaSalida) : new Date();
  let anosCompletos = 0, mesesExtra = 0, diasExtra = 0;
  if (fechaEntrada) {
    anosCompletos = fechaSalidaDate.getFullYear() - fechaEntrada.getFullYear();
    mesesExtra = fechaSalidaDate.getMonth() - fechaEntrada.getMonth();
    diasExtra = fechaSalidaDate.getDate() - fechaEntrada.getDate();
    if (diasExtra < 0) { mesesExtra--; diasExtra += 30; }
    if (mesesExtra < 0) { anosCompletos--; mesesExtra += 12; }
  }
  const totalMeses = anosCompletos * 12 + mesesExtra;
  const mesesDesdeAniversario = mesesExtra + (diasExtra >= 15 ? 1 : 0);
  
  // VACACIONES PROPORCIONALES: promedio ponderado del salario desde el último aniversario
  let salarioVacaciones = salarioMensual;
  if (fechaEntrada && (emp.aumentos || []).length > 0) {
    const ultimoAniv = new Date(fechaEntrada);
    ultimoAniv.setFullYear(fechaEntrada.getFullYear() + anosCompletos);
    if (ultimoAniv > fechaSalidaDate) ultimoAniv.setFullYear(ultimoAniv.getFullYear() - 1);
    salarioVacaciones = salarioPromedioPeriodo(emp, ultimoAniv, fechaSalidaDate);
  }
  const vacProporcionales = (salarioVacaciones / 12) * mesesDesdeAniversario;
  
  // DÉCIMO PROPORCIONAL: promedio ponderado del salario desde el último pago de décimo
  // Décimo se paga 15 abr (mes 3), 15 ago (mes 7), 15 dic (mes 11)
  const mesActual = fechaSalidaDate.getMonth();
  const pagosMes = [3, 7, 11];
  let mesUltimoPago = pagosMes.filter(m => m < mesActual).pop() ?? 11;
  let mesesDesdeDecimo = mesActual - mesUltimoPago;
  if (mesesDesdeDecimo <= 0) mesesDesdeDecimo = 4;
  // Fecha de inicio del período del décimo actual (día 16 del mes del último pago)
  let inicioDecimo;
  if (mesActual <= 3) inicioDecimo = new Date(fechaSalidaDate.getFullYear() - 1, 11, 16);
  else if (mesActual <= 7) inicioDecimo = new Date(fechaSalidaDate.getFullYear(), 3, 16);
  else inicioDecimo = new Date(fechaSalidaDate.getFullYear(), 7, 16);
  let salarioDecimo = salarioMensual;
  if ((emp.aumentos || []).length > 0) {
    salarioDecimo = salarioPromedioPeriodo(emp, inicioDecimo, fechaSalidaDate);
  }
  const decimoProporcional = (salarioDecimo / 12) * Math.min(mesesDesdeDecimo, 4);
  
  const diaDelMes = fechaSalidaDate.getDate();
  const diasTrabajadosPeriodo = diaDelMes <= 15 ? diaDelMes : diaDelMes - 15;
  const pagoDiasTrabajados = diasTrabajadosPeriodo * valorDia;
  let indemnizacion = 0, primaAntigüedad = 0, preaviso = 0;
  const salarioSemanal = salarioMensual / 4.3333;
  if (motivo === "despido_injustificado") {
    let aniosParaCalculo = anosCompletos;
    if (mesesExtra >= 6) aniosParaCalculo++;
    indemnizacion = Math.min(aniosParaCalculo * salarioMensual, 3 * salarioMensual);
    if (totalMeses >= 12) primaAntigüedad = salarioSemanal * 1.92 * (anosCompletos + (mesesExtra >= 6 ? 0.5 : mesesExtra / 12));
    preaviso = totalMeses < 24 ? salarioSemanal : salarioSemanal * 2;
  } else if (motivo === "mutuo_acuerdo" || motivo === "despido_justificado") {
    if (totalMeses >= 12) primaAntigüedad = salarioSemanal * 1.92 * (anosCompletos + mesesExtra / 12);
  }
  const totalLiquidacion = pagoDiasTrabajados + vacProporcionales + decimoProporcional + primaAntigüedad + indemnizacion + preaviso;
  return { emp, motivo, fechaSalida: fechaSalidaDate.toLocaleDateString("es-PA"), salarioMensual, salarioVacaciones, salarioDecimo, valorDia, anosCompletos, mesesExtra, diasExtra, totalMeses, pagoDiasTrabajados, diasTrabajadosPeriodo, vacProporcionales, mesesDesdeAniversario, decimoProporcional, mesesDesdeDecimo, primaAntigüedad, indemnizacion, preaviso, totalLiquidacion };
}

function feriadosDelMes(mes, quincena) {
  const idx = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"].indexOf(mes) + 1;
  return FERIADOS_PANAMA.filter(f => {
    if (f.mes !== idx) return false;
    if (quincena === "1") return f.dia <= 15;
    if (quincena === "2") return f.dia >= 16;
    return true;
  });
}

function AuthScreen({ onAuth }) {

  const [pass, setPass] = useState("");
  const [nombre, setNombre] = useState("");

  const [error, setError] = useState("");
  const [msg, setMsg] = useState("");
  const [showPass, setShowPass] = useState(false);

  const login = async () => {
    setLoading(true); setError("");
    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) setError(error.message === "Invalid login credentials" ? "Correo o contraseña incorrectos." : error.message);
    setLoading(false);
  };

  const register = async () => {
    if (!nombre.trim()) return setError("Ingresa tu nombre.");
    if (pass.length < 6) return setError("La contraseña debe tener al menos 6 caracteres.");
    setLoading(true); setError("");
    const { error } = await supabase.auth.signUp({ email, password: pass, options: { data: { nombre } } });

    setLoading(false);

    else setMsg("Te enviamos un correo para restablecer tu contraseña.");
    setLoading(false);
  };

    marginBottom:0,
  };

  const titles = { login: "Bienvenido de vuelta 👋", register: "Crear cuenta ✨", forgot: "Restablecer contraseña" };

  const [aumentoTarget, setAumentoTarget] = useState(null);
  const [aumentoOrigen, setAumentoOrigen] = useState("form"); // "form" o "lista"
  const aumentoVacio = { fecha: hoy(), salarioNuevo: "", motivo: "" };
  const [nuevoAumento, setNuevoAumento] = useState(aumentoVacio);
  const abrirAumento = (emp, origen = "lista") => {
    setAumentoTarget(emp);
    setAumentoOrigen(origen);
    setNuevoAumento({ ...aumentoVacio, fecha: hoy() });
    setAumentoModal(true);
  };
  const registrarAumento = () => {
    if (!aumentoTarget) return;
    const nuevoSal = parseFloat(nuevoAumento.salarioNuevo);
    const salAnt = parseFloat(aumentoTarget.salario) || 0;
    if (!nuevoAumento.fecha || isNaN(nuevoSal) || nuevoSal <= 0) {
      alert("Completa la fecha y el nuevo salario (mayor a 0).");
      return;
    }
    if (nuevoSal === salAnt) {
      alert("El nuevo salario es igual al actual. No se registró nada.");
      return;
    }
    const entry = {
      id: Date.now(),
      fecha: nuevoAumento.fecha,
      salarioAnterior: salAnt,
      salarioNuevo: nuevoSal,
      motivo: nuevoAumento.motivo || ""
    };
    if (aumentoOrigen === "lista") {
      // Persiste directo en empleadas (sin pasar por edicion)
      setEmpleados(prev => prev.map(e => e.id === aumentoTarget.id ? {
        ...e,
        salario: String(nuevoSal),
        aumentos: [...(e.aumentos || []), entry].sort((a,b) => new Date(a.fecha) - new Date(b.fecha))
      } : e));
    } else {
      // Actualiza formEmp (el usuario guarda con "Actualizar")
      setFormEmp(f => ({
        ...f,
        salario: String(nuevoSal),
        aumentos: [...(f.aumentos || []), entry].sort((a,b) => new Date(a.fecha) - new Date(b.fecha))
      }));
    }
    setNuevoAumento(aumentoVacio);
    setAumentoModal(false);
    setAumentoTarget(null);
  };
  const eliminarAumento = (id) => {
    if (!confirm("¿Eliminar este aumento del historial? El salario actual no cambia.")) return;
    setFormEmp(f => ({ ...f, aumentos: (f.aumentos || []).filter(a => a.id !== id) }));

function Root() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [suscripcion, setSuscripcion] = useState(null);
  const [verificandoSus, setVerificandoSus] = useState(false);

  const cargarSuscripcion = async (userId) => {
    setVerificandoSus(true);
    try {
      // Buscar suscripción existente
      const { data, error } = await supabase
        .from('suscripciones')
        .select('*')
        .eq('user_id', userId)
        .maybeSingle();
      
      if (data) {
        setSuscripcion(data);
      } else {
        // Crear trial automático de 7 días
        const { data: nueva } = await supabase
          .from('suscripciones')
          .insert([{ user_id: userId, plan: 'trial', estado: 'trial' }])
          .select()
          .single();
        setSuscripcion(nueva);
      }
    } catch (err) {
      console.error("Error suscripción:", err);
    }
    setVerificandoSus(false);
  };

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      if (session?.user) cargarSuscripcion(session.user.id);
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
      if (session?.user) cargarSuscripcion(session.user.id);
      else setSuscripcion(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Detectar regreso de pago desde Tilopay
  useEffect(() => {
    if (!user) return;
    const params = new URLSearchParams(window.location.search);
    if (params.get('suscripcion') !== 'success') return;
    
    const code = params.get('code');
    const plan = params.get('plan');
    const auth = params.get('auth');
    const orderNumber = params.get('order') || params.get('orderNumber');
    const description = params.get('description');
    
    // Limpiar la URL inmediatamente para evitar reprocesar al refrescar
    window.history.replaceState({}, '', window.location.pathname);
    
    if (code === '1') {
      // Pago aprobado - marcar suscripción activa en Supabase
      (async () => {
        const ahora = new Date();
        const proximoPago = new Date(ahora);
        if (plan === 'anual') proximoPago.setFullYear(proximoPago.getFullYear() + 1);
        else proximoPago.setMonth(proximoPago.getMonth() + 1);
        
        try {
          await supabase.from('suscripciones').update({
            plan: plan || 'mensual',
            estado: 'activa',
            proximo_pago: proximoPago.toISOString(),
            tilopay_subscription_id: orderNumber || auth || null,
          }).eq('user_id', user.id);
        } catch (err) {
          console.error('Error actualizando suscripcion:', err);
        }
        await cargarSuscripcion(user.id);
        alert("✅ ¡Suscripción activada! Bienvenido a SinContador Pro");
      })();
    } else {
      // Pago rechazado o cancelado
      alert(`❌ El pago no se completó.\n\n${description || 'La transacción fue rechazada.'}\n\nPuedes intentar de nuevo cuando quieras.`);
    }
  }, [user]);

  const logout = async () => {
    await supabase.auth.signOut();
    setUser(null);
    setSuscripcion(null);
  };

  if (loading) return <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", background:"#102650", color:"#E0EDFB", fontFamily:"'Inter',sans-serif", gap:20 }}>
    <svg width="64" height="64" viewBox="0 0 100 100" style={{ opacity:.9 }}>
      <rect x="20" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="36" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="52" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="68" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="12" y="44.5" width="78" height="11" rx="5.5" fill="#9ACDFC" transform="rotate(-15 51 50)"/>
    </svg>
    <div style={{ fontSize:24, fontWeight:900, letterSpacing:".04em" }}>
      <span style={{ color:"#fff" }}>SIN</span>{" "}<span style={{ color:"#9ACDFC" }}>CONTADOR</span>
    </div>
    <div style={{ fontSize:12, opacity:.6, letterSpacing:".08em" }}>Cargando...</div>
  </div>;

  if (!user) return <AuthScreen onAuth={setUser} />;

  // Verificar estado de suscripción
  if (verificandoSus || !suscripcion) return <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", background:"#102650", color:"#E0EDFB", fontFamily:"'Inter',sans-serif", gap:20 }}>
    <svg width="64" height="64" viewBox="0 0 100 100" style={{ opacity:.9 }}>
      <rect x="20" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="36" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="52" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="68" y="20" width="10" height="60" rx="5" fill="#FFFFFF"/>
      <rect x="12" y="44.5" width="78" height="11" rx="5.5" fill="#9ACDFC" transform="rotate(-15 51 50)"/>
    </svg>
    <div style={{ fontSize:24, fontWeight:900, letterSpacing:".04em" }}>
      <span style={{ color:"#fff" }}>SIN</span>{" "}<span style={{ color:"#9ACDFC" }}>CONTADOR</span>
    </div>
    <div style={{ fontSize:12, opacity:.6, letterSpacing:".08em" }}>Verificando suscripción...</div>
  </div>;

  const ahora = new Date();
  const trialFin = suscripcion.trial_fin ? new Date(suscripcion.trial_fin) : null;
  const trialActivo = trialFin && trialFin > ahora;
  const suscripcionActiva = suscripcion.estado === 'activa' && suscripcion.plan !== 'trial';
  
  // Si no tiene suscripción activa ni trial activo, mostrar pantalla de pago
  if (!suscripcionActiva && !trialActivo) {
    return <SuscripcionScreen user={user} onLogout={logout} suscripcion={suscripcion} onReload={() => cargarSuscripcion(user.id)} />;
  }

  return <MainApp user={user} onLogout={logout} suscripcion={suscripcion} onVerSuscripcion={() => {
    // Forzar mostrar pantalla de suscripción
    setSuscripcion({...suscripcion, estado: 'expired', trial_fin: new Date(Date.now() - 1000).toISOString()});
  }} />;
}
